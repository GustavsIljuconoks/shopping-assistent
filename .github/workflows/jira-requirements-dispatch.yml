name: Requirements To Jira Plan

on:
  repository_dispatch:
    types: [jira_requirements_button]
  workflow_dispatch:
    inputs:
      issue_key:
        description: "Optional Jira issue key for traceability (e.g., KAN-8)"
        required: false
        type: string
      source_path:
        description: "Markdown requirements source path"
        required: false
        default: "specs/product-requirements.md"
        type: string
      plan_out:
        description: "Generated plan output path"
        required: false
        default: "output/generated-plan.json"
        type: string
      project_key:
        description: "Target Jira project key"
        required: false
        default: "KAN"
        type: string
      apply_approve:
        description: "Create Jira issues (false = dry run only)"
        required: false
        default: false
        type: boolean
      ledger_out:
        description: "Created issue ledger output path"
        required: false
        default: "output/applied-issues.json"
        type: string

permissions:
  contents: read

concurrency:
  group: requirements-jira-${{ github.event.client_payload.issue_key || inputs.issue_key || github.run_id }}
  cancel-in-progress: false

jobs:
  requirements-to-jira:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      ISSUE_KEY: ${{ github.event.client_payload.issue_key || inputs.issue_key }}
      SOURCE_PATH: ${{ github.event.client_payload.source_path || inputs.source_path || 'specs/product-requirements.md' }}
      PLAN_OUT: ${{ github.event.client_payload.plan_out || inputs.plan_out || 'output/generated-plan.json' }}
      PROJECT_KEY: ${{ github.event.client_payload.project_key || inputs.project_key || 'KAN' }}
      APPLY_APPROVE: ${{ github.event.client_payload.apply_approve || inputs.apply_approve || 'false' }}
      LEDGER_OUT: ${{ github.event.client_payload.ledger_out || inputs.ledger_out || 'output/applied-issues.json' }}
      JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
      JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
      JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Jira plan from requirements
        run: npx tsx scripts/dark-factory.ts plan "$SOURCE_PATH" --out "$PLAN_OUT"

      - name: Preflight or apply to Jira
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$APPLY_APPROVE" == "true" || "$APPLY_APPROVE" == "1" ]]; then
            npx tsx scripts/dark-factory.ts apply "$PLAN_OUT" --project "$PROJECT_KEY" --approve --out "$LEDGER_OUT"
          else
            npx tsx scripts/dark-factory.ts apply "$PLAN_OUT" --project "$PROJECT_KEY"
          fi

      - name: Print outputs
        run: |
          echo "Issue key: ${ISSUE_KEY:-<none>}"
          echo "Plan file: $PLAN_OUT"
          echo "Ledger file: $LEDGER_OUT"
